services:
  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wm811k -d wm811k"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MODEL_PATH: artifacts/custom_cnn_best.pt
      LABEL_MAPPING_PATH: artifacts/label_mapping.json
      CORS_ORIGINS: '["http://localhost:8501","http://localhost:8000"]'
    ports:
      - "8000:8000"
    volumes:
      - ./artifacts:/app/artifacts:ro
      - inspection_data:/app/data
    depends_on:
      database:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      API_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api

volumes:
  postgres_data:
  inspection_data:
